<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍆 EGGPLANT SNAKE 🐍</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a0a;
            font-family: 'Courier New', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            color: #00ff00;
        }
        h1 {
            font-size: 48px;
            margin-bottom: 20px;
            text-shadow: 0 0 20px #00ff00;
            color: #00ff00;
        }
        canvas {
            border: 4px solid #00ff00;
            background: #000;
            box-shadow: 0 0 30px #00ff00;
            display: block;
            margin: 0 auto;
        }
        .info {
            margin-top: 20px;
            text-align: center;
            max-width: 600px;
        }
        .controls {
            background: #1a1a1a;
            padding: 15px;
            border: 2px solid #00ff00;
            margin: 10px 0;
            border-radius: 4px;
            font-size: 14px;
        }
        .stats {
            display: flex;
            gap: 20px;
            margin-top: 15px;
            justify-content: center;
        }
        .stat-item {
            background: #1a1a1a;
            padding: 10px 20px;
            border: 1px solid #00ff00;
            border-radius: 4px;
            font-size: 16px;
        }
        p {
            margin-top: 15px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <h1>🍆 EGGPLANT SNAKE 🐍</h1>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    
    <div class="info">
        <div class="controls">
            <strong>⌨️ CONTROLS:</strong><br>
            Arrow Keys or WASD - Move | SPACE - Pause | R - Restart
        </div>
        
        <div class="stats">
            <div class="stat-item">Score: <span id="score">0</span></div>
            <div class="stat-item">Length: <span id="length">4</span></div>
            <div class="stat-item">Level: <span id="level">1</span></div>
        </div>
        
        <p>🍆 Eat eggplants and grow! Avoid walls and yourself!</p>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        const GRID_SIZE = 20;
        const TILES_X = canvas.width / GRID_SIZE;
        const TILES_Y = canvas.height / GRID_SIZE;

        let snake = [
            { x: 10, y: 10 },
            { x: 9, y: 10 },
            { x: 8, y: 10 },
            { x: 7, y: 10 }
        ];

        let direction = { x: 1, y: 0 };
        let nextDirection = { x: 1, y: 0 };
        let eggplant = { x: 5, y: 5 };
        let score = 0;
        let level = 1;
        let gameOver = false;
        let isPaused = false;
        let speed = 100;
        let lastMoveTime = 0;

        function drawGrid() {
            ctx.strokeStyle = '#1a1a1a';
            ctx.lineWidth = 1;
            for (let i = 0; i <= TILES_X; i++) {
                ctx.beginPath();
                ctx.moveTo(i * GRID_SIZE, 0);
                ctx.lineTo(i * GRID_SIZE, canvas.height);
                ctx.stroke();
            }
            for (let i = 0; i <= TILES_Y; i++) {
                ctx.beginPath();
                ctx.moveTo(0, i * GRID_SIZE);
                ctx.lineTo(canvas.width, i * GRID_SIZE);
                ctx.stroke();
            }
        }

        function drawSnake() {
            snake.forEach((segment, index) => {
                const x = segment.x * GRID_SIZE;
                const y = segment.y * GRID_SIZE;

                if (index === 0) {
                    // Head
                    ctx.fillStyle = '#00ff00';
                    ctx.fillRect(x + 1, y + 1, GRID_SIZE - 2, GRID_SIZE - 2);
                    
                    // Eyes
                    ctx.fillStyle = '#000000';
                    ctx.fillRect(x + 4, y + 4, 3, 3);
                    ctx.fillRect(x + 13, y + 4, 3, 3);
                } else {
                    // Body
                    ctx.fillStyle = '#00dd00';
                    ctx.fillRect(x + 1, y + 1, GRID_SIZE - 2, GRID_SIZE - 2);
                    ctx.strokeStyle = '#00aa00';
                    ctx.strokeRect(x + 1, y + 1, GRID_SIZE - 2, GRID_SIZE - 2);
                }
            });
        }

        function drawEggplant() {
            const x = eggplant.x * GRID_SIZE;
            const y = eggplant.y * GRID_SIZE;
            const cx = x + GRID_SIZE / 2;
            const cy = y + GRID_SIZE / 2;

            // Purple eggplant
            ctx.fillStyle = '#661199';
            ctx.beginPath();
            ctx.ellipse(cx, cy + 2, GRID_SIZE / 2 - 3, GRID_SIZE / 2 - 1, 0, 0, Math.PI * 2);
            ctx.fill();

            ctx.strokeStyle = '#441166';
            ctx.lineWidth = 2;
            ctx.stroke();

            // Green stem
            ctx.fillStyle = '#00dd00';
            ctx.fillRect(cx - 4, y + 2, 8, 6);

            // Shine
            ctx.fillStyle = '#9944cc';
            ctx.fillRect(cx - 4, cy - 2, 3, 3);
        }

        function update(currentTime) {
            if (gameOver || isPaused) return;

            if (currentTime - lastMoveTime < speed) return;
            lastMoveTime = currentTime;

            direction = nextDirection;

            const head = snake[0];
            const newHead = {
                x: head.x + direction.x,
                y: head.y + direction.y
            };

            // Check wall collision
            if (newHead.x < 0 || newHead.x >= TILES_X || newHead.y < 0 || newHead.y >= TILES_Y) {
                endGame('Hit wall!');
                return;
            }

            // Check self collision
            if (snake.some(segment => segment.x === newHead.x && segment.y === newHead.y)) {
                endGame('Hit yourself!');
                return;
            }

            snake.unshift(newHead);

            // Check eggplant collision
            if (newHead.x === eggplant.x && newHead.y === eggplant.y) {
                score += 10;
                document.getElementById('score').textContent = score;
                document.getElementById('length').textContent = snake.length;

                // Spawn new eggplant
                let validSpot = false;
                while (!validSpot) {
                    eggplant = {
                        x: Math.floor(Math.random() * TILES_X),
                        y: Math.floor(Math.random() * TILES_Y)
                    };
                    validSpot = !snake.some(s => s.x === eggplant.x && s.y === eggplant.y);
                }

                // Increase speed every 3 eggplants
                if (score % 30 === 0) {
                    speed = Math.max(50, speed - 10);
                    level = Math.floor(score / 30) + 1;
                    document.getElementById('level').textContent = level;
                }
            } else {
                snake.pop();
            }
        }

        function draw() {
            // Clear
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            drawGrid();
            drawSnake();
            drawEggplant();
        }

        function gameLoop(currentTime) {
            update(currentTime);
            draw();
            requestAnimationFrame(gameLoop);
        }

        function endGame(reason) {
            gameOver = true;
            ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#ff0000';
            ctx.font = 'bold 20px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('GAME OVER!', canvas.width / 2, canvas.height / 2 - 20);
            ctx.fillText(reason, canvas.width / 2, canvas.height / 2 + 20);
            
            setTimeout(() => {
                alert(`GAME OVER!\n${reason}\n\nScore: ${score}\nLength: ${snake.length}\nLevel: ${level}`);
                location.reload();
            }, 500);
        }

        document.addEventListener('keydown', (e) => {
            const key = e.key.toUpperCase();

            if (e.key === 'ArrowLeft' || key === 'A') {
                if (direction.x === 0) nextDirection = { x: -1, y: 0 };
            } else if (e.key === 'ArrowRight' || key === 'D') {
                if (direction.x === 0) nextDirection = { x: 1, y: 0 };
            } else if (e.key === 'ArrowUp' || key === 'W') {
                if (direction.y === 0) nextDirection = { x: 0, y: -1 };
            } else if (e.key === 'ArrowDown' || key === 'S') {
                if (direction.y === 0) nextDirection = { x: 0, y: 1 };
            } else if (e.key === ' ') {
                e.preventDefault();
                isPaused = !isPaused;
            } else if (key === 'R') {
                location.reload();
            }
        });

        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
